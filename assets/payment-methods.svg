<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 60" role="img" aria-label="Zahlungsmethoden: Visa, Mastercard, PayPal, Apple Pay, Google Pay, Bitcoin, USDT">
  <defs>
    <rect id="card" width="90" height="48" rx="8"/>
    <style>
      .pm-card { fill: #fff; }
      .pm-lbl { font-family: 'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif; font-weight: 800; }
    </style>
  </defs>

  <!-- Visa -->
  <g transform="translate(0,6)"><rect class="pm-card" width="90" height="48" rx="8"/>
    <text x="45" y="31" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="900" fill="#1A1F71" letter-spacing="-1">VISA</text>
  </g>

  <!-- Mastercard -->
  <g transform="translate(100,6)"><rect class="pm-card" width="90" height="48" rx="8"/>
    <circle cx="32" cy="24" r="16" fill="#EB001B" opacity=".9"/>
    <circle cx="58" cy="24" r="16" fill="#F79E1B" opacity=".9"/>
    <path d="M45 13a16 16 0 0 1 0 22 16 16 0 0 1 0-22z" fill="#FF5F00" opacity=".8"/>
  </g>

  <!-- PayPal -->
  <g transform="translate(200,6)"><rect class="pm-card" width="90" height="48" rx="8"/>
    <text x="45" y="24" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="900" fill="#003087">Pay</text>
    <text x="45" y="36" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="900" fill="#009CDE">Pal</text>
  </g>

  <!-- Apple Pay -->
  <g transform="translate(300,6)"><rect class="pm-card" width="90" height="48" rx="8"/>
    <text x="45" y="28" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#000"> Pay</text>
    <text x="34" y="28" text-anchor="middle" font-family="sans-serif" font-size="16" fill="#000">&#xF8FF;</text>
  </g>

  <!-- Google Pay -->
  <g transform="translate(400,6)"><rect class="pm-card" width="90" height="48" rx="8"/>
    <text x="45" y="30" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="700">
      <tspan fill="#4285F4">G</tspan><tspan fill="#EA4335">o</tspan><tspan fill="#FBBC05">o</tspan><tspan fill="#4285F4">g</tspan><tspan fill="#34A853">l</tspan><tspan fill="#EA4335">e</tspan>
    </text>
    <text x="45" y="43" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="700" fill="#5F6368">Pay</text>
  </g>

  <!-- Bitcoin -->
  <g transform="translate(500,6)"><rect class="pm-card" width="90" height="48" rx="8"/>
    <text x="45" y="20" text-anchor="middle" font-family="sans-serif" font-size="20" fill="#F7931A">₿</text>
    <text x="45" y="38" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#888">Bitcoin</text>
  </g>

  <!-- USDT -->
  <g transform="translate(600,6)"><rect class="pm-card" width="90" height="48" rx="8"/>
    <text x="45" y="20" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="900" fill="#26A17B">₮</text>
    <text x="45" y="36" text-anchor="middle" font-family="sans-serif" font-size="9" font-weight="700" fill="#888">USDT / Krypto</text>
  </g>
</svg>
