<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 72" fill="none" role="img" aria-label="FlimmerKanal">
  <defs>
    <!-- Main text gradient: orange → hot pink → purple → blue (Sky-inspired) -->
    <linearGradient id="fk-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#FF6B1A"/>
      <stop offset="28%"  stop-color="#FF1E8C"/>
      <stop offset="58%"  stop-color="#BF24FF"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <!-- Subtle glow for the icon -->
    <linearGradient id="fk-icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#FF6B1A"/>
      <stop offset="50%"  stop-color="#FF1E8C"/>
      <stop offset="100%" stop-color="#BF24FF"/>
    </linearGradient>
    <filter id="fk-glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Icon: stylised "FK" play-button shape -->
  <g filter="url(#fk-glow)">
    <!-- Rounded rectangle background for icon -->
    <rect x="2" y="8" width="56" height="56" rx="14" fill="url(#fk-icon-grad)" opacity="0.15"/>
    <rect x="2" y="8" width="56" height="56" rx="14" stroke="url(#fk-icon-grad)" stroke-width="1.5" fill="none"/>
    <!-- Play triangle -->
    <path d="M23 26 L23 46 L42 36 Z" fill="url(#fk-icon-grad)"/>
    <!-- Small "F" bar top-left -->
    <rect x="14" y="20" width="3" height="14" rx="1.5" fill="url(#fk-icon-grad)" opacity="0.7"/>
    <rect x="14" y="20" width="8" height="3" rx="1.5" fill="url(#fk-icon-grad)" opacity="0.7"/>
    <rect x="14" y="27" width="5" height="2.5" rx="1.25" fill="url(#fk-icon-grad)" opacity="0.7"/>
  </g>
  <!-- Text: FlimmerKanal -->
  <text
    x="68" y="50"
    font-family="'Plus Jakarta Sans', 'DM Sans', system-ui, sans-serif"
    font-size="33"
    font-weight="800"
    letter-spacing="-0.5"
    fill="url(#fk-grad)"
  >FlimmerKanal</text>
</svg>
