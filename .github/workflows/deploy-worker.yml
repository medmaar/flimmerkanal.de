name: Deploy Worker

on:
  push:
    branches: [main]
    paths:
      - 'worker/worker.js'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Deploy Worker via Cloudflare API
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: iptv-trial-flimmerkanal
        run: |
          METADATA=$(cat <<'METADATA'
          {
            "main_module": "worker.js",
            "compatibility_date": "2024-01-01",
            "bindings": [
              {
                "type": "kv_namespace",
                "name": "TRIALS",
                "namespace_id": "7b8077c1af464a929d20981a52193b89"
              }
            ]
          }
          METADATA
          )
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/${WORKER_NAME}" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -F "metadata=${METADATA};type=application/json" \
            -F "worker.js=@worker/worker.js;type=application/javascript+module"

      - name: Enable workers.dev subdomain
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: iptv-trial-flimmerkanal
        run: |
          curl -s -X POST \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/${WORKER_NAME}/subdomain" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"enabled": true}'

      - name: Set Cron Trigger
        env:
          CF_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT: ${{ secrets.CF_ACCOUNT_ID }}
          WORKER_NAME: iptv-trial-flimmerkanal
        run: |
          curl -s -X PUT \
            "https://api.cloudflare.com/client/v4/accounts/${CF_ACCOUNT}/workers/scripts/${WORKER_NAME}/schedules" \
            -H "Authorization: Bearer ${CF_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '[{"cron": "0 * * * *"}]'

      - name: Verify worker reachable
        run: |
          sleep 8
          mkdir -p .debug
          curl -s "https://iptv-trial-flimmerkanal.medmaar.workers.dev/" > .debug/check.txt
          curl -s -X POST "https://iptv-trial-flimmerkanal.medmaar.workers.dev/" \
            -H "Content-Type: application/json" \
            -d '{"name":"Test","email":"test@example.com"}' >> .debug/check.txt
          cat .debug/check.txt

      - name: Commit result
        run: |
          git config user.name bot
          git config user.email bot@example.com
          git add .debug/check.txt
          git commit -m "debug: worker check" || true
          git push || true
